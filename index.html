<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Step Tracker Cloud</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

<h1>☁️ AI Step Tracker</h1>

<div class="card">

<label>Date</label>
<input type="date" id="date">

<label>Samsung Steps</label>
<input type="number" id="samsungSteps">

<label>Zepp Steps</label>
<input type="number" id="zeppSteps">

<label>Adjusted Zepp Steps</label>

<input
  type="number"
  id="adjustedZeppSteps"
  readonly
>

<label>Daily Goal</label>
<input type="number" id="goal" value="10000">

<button onclick="saveEntry()">
Save To Google Sheets
</button>

</div>

<div class="card">

<h3>Goal Progress</h3>

<div class="progress-container">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="stats-grid">

<div class="stat-box">
<div class="stat-title">Today's Total</div>
<div class="stat-value" id="todayTotal">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Monthly Total</div>
<div class="stat-value" id="monthlyTotal">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Current Streak</div>
<div class="stat-value" id="streakValue">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Best Day</div>
<div class="stat-value" id="bestDay">0</div>
</div>

</div>

</div>

<div class="card">
<h3>AI Insights</h3>
<div id="aiInsights"></div>
</div>

<div class="card">
<h3>Leaderboard Against Yourself</h3>

<div class="table-wrapper">

<table id="leaderboardTable">
<thead>
<tr>
<th>Rank</th>
<th>Date</th>
<th>Steps</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<div class="card">
<h3>Calendar Heatmap</h3>
<div id="heatmap" class="heatmap"></div>
</div>

<div class="card">
<canvas id="stepsChart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
